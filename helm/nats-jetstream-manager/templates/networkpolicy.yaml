{{- if .Values.networkPolicy.enabled -}}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "nats-jetstream-manager.fullname" . }}-backend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nats-jetstream-manager.backend.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "nats-jetstream-manager.backend.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "nats-jetstream-manager.frontend.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.backend.service.port }}
    {{- if .Values.ingress.enabled }}
    - from: []
      ports:
        - protocol: TCP
          port: {{ .Values.backend.service.port }}
    {{- end }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "nats-jetstream-manager.fullname" . }}-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nats-jetstream-manager.frontend.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "nats-jetstream-manager.frontend.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: {{ .Values.frontend.service.port }}
{{- end }}
